# CodeGuardian AI — local development stack.
# Postgres, Redis, Neo4j, Qdrant, and the API service. Dev-only credentials; in real
# environments secrets are injected from a secret manager, never hardcoded (PRD §9.6).

name: codeguardian

services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      CG_ENVIRONMENT: development
      CG_DATABASE_URL: postgresql+psycopg://codeguardian:codeguardian@postgres:5432/codeguardian
      CG_REDIS_URL: redis://redis:6379/0
      CG_GITHUB_WEBHOOK_SECRET: ${CG_GITHUB_WEBHOOK_SECRET:-dev-webhook-secret}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Runtime hardening
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codeguardian
      POSTGRES_PASSWORD: codeguardian
      POSTGRES_DB: codeguardian
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeguardian"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/codeguardian
      NEO4J_server_memory_pagecache_size: 256M
    ports:
      - "7474:7474"   # browser
      - "7687:7687"   # bolt
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  redisdata:
  neo4jdata:
  qdrantdata:
