name: Release (SBOM + signed image)

# Supply-chain integrity on tagged releases (PRD §9.7): build the API image, generate an
# SBOM (syft), scan it, sign the image + SBOM with cosign (keyless/OIDC), and publish.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing via GitHub OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build image
        working-directory: backend
        run: docker build -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} .

      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Scan SBOM (grype)
        uses: anchore/scan-action@v4
        with:
          sbom: sbom.spdx.json
          fail-build: true
          severity-cutoff: high

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image + attach SBOM attestation (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          IMG=ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          cosign sign --yes "$IMG"
          cosign attest --yes --predicate sbom.spdx.json --type spdxjson "$IMG"
